<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Avengers Members - Ajax Fetch (XML)</title>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container my-3">
  <h3 class="card-header">Avengers Members (XML)</h3>
  <input type="text" id="searchBox" placeholder="이름 검색..." class="form-control my-2" onkeyup="filterTable()"/>
  <table class="table table-striped table-bordered" id="memberTable">
    <thead>
      <tr><th>Image</th><th>Name</th><th>Age</th><th>Address</th><th>Mobile</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- 모달 -->
<div class="modal fade" id="infoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Member Info</h5></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button></div>
    </div>
  </div>
</div>

<script>
// XML 불러오기
function loadXml(){
  fetch("./data/members.xml")
    .then(res => res.text())
    .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
    .then(xml => {
      let members = xml.getElementsByTagName("member");
      let result = "";

    /////ver-1
      /*
      for(let i=0; i<members.length; i++){
        let name   = members[i].getElementsByTagName("name")[0].textContent;
        let age    = members[i].getElementsByTagName("age")[0].textContent;
        let addr   = members[i].getElementsByTagName("address")[0].textContent;
        let mobile = members[i].getElementsByTagName("mobile")[0].textContent;
        let img    = members[i].getElementsByTagName("img")[0].textContent;
        result += `<tr onclick="showModal('${name}','${age}','${addr}','${mobile}','${img}')">
                     <td><img src="${img}" width="50"></td>
                     <td>${name}</td><td>${age}</td><td>${addr}</td><td>${mobile}</td>
                   </tr>`;
      }
      document.querySelector("#memberTable tbody").innerHTML = result;
    */

        
    /////ver-2
    for (let member of members) {
        let name   = member.getElementsByTagName("name")[0].textContent;
        let age    = member.getElementsByTagName("age")[0].textContent;
        let addr   = member.getElementsByTagName("address")[0].textContent;
        let mobile = member.getElementsByTagName("mobile")[0].textContent;
        let img    = member.getElementsByTagName("img")[0].textContent;

        result += `<tr onclick="showModal('${name}','${age}','${addr}','${mobile}','${img}')">
                    <td><img src="${img}" width="50"></td>
                    <td>${name}</td><td>${age}</td><td>${addr}</td><td>${mobile}</td>
                    </tr>`;
        }
      document.querySelector("#memberTable tbody").innerHTML = result;
    
    
    
    
    
    });
    

}

// 모달 팝업
function showModal(name, age, address, mobile, img){
  document.getElementById("modalBody").innerHTML =
    `<img src="${img}" width="150"><br/>
     <p>이름: ${name}</p>
     <p>나이: ${age}</p>
     <p>주소: ${address}</p>
     <p>전화: ${mobile}</p>`;
  new bootstrap.Modal(document.getElementById("infoModal")).show();
}

// 검색 필터
function filterTable(){
  let keyword = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll("#memberTable tbody tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(keyword) ? "" : "none";
  });
}

// 페이지 로드 시 XML 불러오기
window.onload = loadXml;
</script>
</body>
</html>
